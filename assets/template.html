<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0d12"><title>BOKUN デイリー</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d12;--bg2:#11141c;--card:#171b25;--line:#2b3346;--gold:#d9b441;--gold-soft:#f0d97e;--gold-dim:#9a8138;
--ink:#f6f3ea;--ink-dim:#c2c7d2;--ink-faint:#8b93a4;--good:#6cc796;--warn:#e29a6c;
--jp:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;--mincho:"Shippori Mincho",serif;--num:"Cormorant Garamond","Shippori Mincho",serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:17px}body{font-family:var(--jp);color:var(--ink);line-height:1.6;
background:radial-gradient(1200px 600px at 50% -10%,rgba(217,180,65,.10),transparent 60%),var(--bg);
padding:env(safe-area-inset-top) 0 calc(88px + env(safe-area-inset-bottom));overflow-x:hidden}
.wrap{max-width:540px;margin:0 auto;padding:0 20px}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(11,13,18,.96),rgba(11,13,18,.85));border-bottom:1px solid var(--line)}
.head-in{max-width:540px;margin:0 auto;padding:13px 20px 0;display:flex;align-items:baseline;justify-content:space-between}
.brand{font-family:var(--mincho);font-weight:700;font-size:1.02rem}
.brand .mark{color:var(--gold);letter-spacing:.16em;font-size:.68rem;display:block;font-family:var(--jp)}
.updated{font-size:.68rem;color:var(--ink-faint);text-align:right}.updated b{color:var(--ink-dim)}
.seg{max-width:540px;margin:10px auto 0;padding:0 20px 12px}
.seg-in{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
.seg button{flex:1;background:none;border:none;padding:9px 4px;border-radius:9px;color:var(--ink-faint);font-family:var(--jp);font-size:.86rem;font-weight:700;cursor:pointer;transition:.18s}
.seg button.active{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#1a160a}
.page{display:none;animation:fade .3s ease}.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-h{font-family:var(--mincho);font-weight:700;font-size:1.4rem;padding:20px 0 2px}
.page-sub{font-size:.78rem;color:var(--ink-faint);margin-bottom:14px}
.hero{padding:14px 0 6px;text-align:center}
.hero .label{font-size:.74rem;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.hero .big{font-family:var(--num);font-weight:700;font-size:3.6rem;line-height:1;color:var(--gold);text-shadow:0 0 40px rgba(217,180,65,.25)}
.hero .big .yen{font-size:1.8rem;vertical-align:.3em;color:var(--gold-soft)}
.hero .sub{font-size:.95rem;color:var(--ink-dim);margin-top:8px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
.kpi .t{font-size:.7rem;color:var(--ink-faint);font-weight:700}
.kpi .v{font-family:var(--num);font-size:1.6rem;font-weight:700;color:var(--ink)}
.kpi .s{font-size:.7rem;color:var(--ink-faint)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
.card h3{font-size:.8rem;color:var(--gold-soft);font-weight:700;margin-bottom:10px;letter-spacing:.04em}
.row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed rgba(43,51,70,.6)}
.row:last-child{border-bottom:none}
.row .nm{flex:0 0 108px;font-size:.8rem;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .bar{flex:1;height:8px;background:var(--bg2);border-radius:5px;overflow:hidden}
.row .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:5px}
.row .val{flex:0 0 96px;text-align:right;font-size:.78rem;color:var(--ink);font-variant-numeric:tabular-nums}
.row .cnt{flex:0 0 44px;text-align:right;font-size:.72rem;color:var(--ink-faint);font-variant-numeric:tabular-nums}
.st{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px dashed rgba(43,51,70,.6)}
.st:last-child{border-bottom:none}
.st .ic{flex:0 0 20px;font-size:.9rem}
.st .lb{flex:0 0 128px;font-size:.78rem;color:var(--ink-faint);font-weight:700}
.st .vl{flex:1;font-size:.8rem;color:var(--ink-dim)}
.ok{color:var(--good)}.ng{color:var(--warn)}
svg text{font-family:var(--jp)}
.note{font-size:.72rem;color:var(--ink-faint);line-height:1.7;margin-top:8px}
.badge{display:inline-block;font-size:.66rem;font-weight:700;color:var(--gold-soft);background:rgba(217,180,65,.13);border:1px solid var(--gold-dim);padding:2px 9px;border-radius:20px;margin:14px 0 0}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:linear-gradient(0deg,rgba(11,13,18,.98),rgba(11,13,18,.9));border-top:1px solid var(--line);backdrop-filter:blur(12px)}
.nav-in{max-width:540px;margin:0 auto;display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
nav button{flex:1;background:none;border:none;color:var(--ink-faint);font-family:var(--jp);font-size:.56rem;font-weight:700;padding:7px 1px;cursor:pointer;border-radius:10px}
nav button.active{color:var(--gold)}
nav button .ic{display:block;font-size:1rem;margin-bottom:2px}
.up{color:var(--good)}.dn{color:var(--warn)}
.ys{font-family:var(--jp);font-weight:700;font-size:.68em;margin-right:.12em;opacity:.85}
</style></head><body>
<header><div class="head-in"><div class="brand"><span class="mark">TRAVELING TOKYO / KYOTO</span>BOKUN デイリー</div>
<div class="updated">更新<br><b id="upd"></b></div></div>
<div class="seg"><div class="seg-in">
<button data-r="all" class="active">全社</button><button data-r="tokyo">東京</button><button data-r="kyoto">京都</button>
</div></div></header>
<div class="wrap">
<section class="page active" id="p-today"></section>
<section class="page" id="p-trend"></section>
<section class="page" id="p-channel"></section>
<section class="page" id="p-product"></section>
<section class="page" id="p-combined"></section>
<section class="page" id="p-square"></section>
<section class="page" id="p-audit"></section>
</div>
<nav><div class="nav-in">
<button data-p="today" class="active"><span class="ic">☀</span>昨日</button>
<button data-p="trend"><span class="ic">📈</span>推移</button>
<button data-p="channel"><span class="ic">🛒</span>チャネル</button>
<button data-p="product"><span class="ic">🎌</span>商品</button>
<button data-p="combined"><span class="ic">💰</span>合算</button>
<button data-p="square"><span class="ic">💴</span>Square</button>
<button data-p="audit"><span class="ic">🩺</span>審査</button>
</div></nav>
<script id="data" type="application/json">__DATA_JSON__</script>
<script>
const DATA=JSON.parse(document.getElementById('data').textContent);
let REGION='all';
const YS='<span class="ys">¥</span>';
const yen=v=>YS+Math.round(v).toLocaleString('ja-JP');
const yenS=v=>v>=1e8?YS+(v/1e8).toFixed(2)+'億':v>=1e4?YS+Math.round(v/1e4).toLocaleString()+'万':yen(v);
document.getElementById('upd').textContent=DATA.updated;
function rows(list,valKey){const mx=Math.max(...list.map(x=>x[valKey]),1);
 return list.map(x=>`<div class="row"><span class="nm">${x.name}</span><span class="bar"><i style="width:${(x[valKey]/mx*100).toFixed(1)}%"></i></span><span class="val">${yen(x[valKey])}</span><span class="cnt">${x.n}件</span></div>`).join('')}
const SP={};
function spark(d30,key,sid){const w=500,h=120,pad=4;const vals=d30.map(x=>x[key]);const mx=Math.max(...vals,1);
 const bw=(w-pad*2)/d30.length;
 SP[sid]={data:d30,key:key};
 const bars=d30.map((x,i)=>{const bh=Math.max(2,(x[key]/mx)*(h-30));
  const isY=i===d30.length-1;
  return `<rect class="b" x="${(pad+i*bw).toFixed(1)}" y="${(h-20-bh).toFixed(1)}" width="${(bw*0.66).toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${isY?'#f0d97e':'#9a8138'}" opacity="${isY?1:0.75}"/>`}).join('');
 const hits=d30.map((x,i)=>`<rect x="${(pad+i*bw).toFixed(1)}" y="0" width="${bw.toFixed(1)}" height="${h-18}" fill="transparent" style="cursor:pointer" onclick="pick('${sid}',${i})"/>`).join('');
 const lbl=[0,9,19,29].filter(i=>i<d30.length).map(i=>`<text x="${(pad+i*bw).toFixed(1)}" y="${h-6}" font-size="9" fill="#8b93a4">${d30[i].d.slice(5)}</text>`).join('');
 return `<div id="info-${sid}" style="font-size:.86rem;margin:2px 0 6px;font-variant-numeric:tabular-nums;color:var(--ink)"></div>
 <svg id="svg-${sid}" viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${bars}${lbl}${hits}</svg>
 <div class="note" style="margin-top:2px">▲ 棒をタップするとその日の数字が出ます</div>`}
function pick(sid,i){const s=SP[sid];if(!s)return;const x=s.data[i];
 const el=document.getElementById('info-'+sid);
 if(el)el.innerHTML=`<b style="color:#f0d97e">${x.d.slice(5).replace('-','/')}</b> — 純売上 ${yen(x.net)} ・ ${x.n}件`;
 const svg=document.getElementById('svg-'+sid);
 if(svg){const bs=svg.querySelectorAll('rect.b');bs.forEach((r,j)=>r.setAttribute('opacity',j===i?'1':'0.4'));}}
function pct(a,b){if(!b)return'—';const p=(a/b-1)*100;return `<span class="${p>=0?'up':'dn'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`}
function render(){
 const R=DATA.regions[REGION];const y=R.y;
 const rb={'all':'全社','tokyo':'東京','kyoto':'京都'}[REGION];
 document.getElementById('p-today').innerHTML=`
  <div class="hero"><div class="label">Yesterday net sales</div>
  <div class="big"><span class="yen">¥</span>${Math.round(y.net).toLocaleString()}</div>
  <div class="sub">${DATA.yesterday}(催行ベース・手数料控除後)</div></div>
  <span class="badge">${rb}</span>
  <div class="kpis">
   <div class="kpi"><div class="t">確定予約</div><div class="v">${y.n}</div><div class="s">件</div></div>
   <div class="kpi"><div class="t">参加人数</div><div class="v">${y.pax.toLocaleString()}</div><div class="s">名</div></div>
   <div class="kpi"><div class="t">当月累計 (${R.tmLabel})</div><div class="v" style="font-size:1.15rem">${yenS(R.mtd.net)}</div><div class="s">${R.mtd.n.toLocaleString()}件 / 前月同期 ${pct(R.mtd.net,R.lmtd.net)}</div></div>
   <div class="kpi"><div class="t">キャンセル(昨日催行分)</div><div class="v">${y.cancelled}</div><div class="s">件</div></div>
  </div>
  <div class="card"><h3>昨日のチャネル別 純売上</h3>${rows(R.channels_y,'net')||''}</div>
  <div class="card"><h3>昨日の商品別 純売上 TOP</h3>${rows(R.products_y,'net')}</div>`;
 document.getElementById('p-trend').innerHTML=`
  <div class="page-h">推移</div><div class="page-sub">直近30日・催行日ベース(確定)</div>
  <span class="badge">${rb}</span>
  <div class="card"><h3>日次 純売上(30日)</h3>${spark(R.d30,'net','tnet')}
   <div class="note">金=昨日。30日計 ${yenS(R.d30.reduce((s,x)=>s+x.net,0))} / ${R.d30.reduce((s,x)=>s+x.n,0).toLocaleString()}件</div></div>
  <div class="card"><h3>日次 予約件数(30日)</h3>${spark(R.d30,'n','tn')}</div>
  <div class="card"><h3>当月 vs 前月</h3>
   <div class="row"><span class="nm">${R.tmLabel} 累計</span><span class="bar"><i style="width:${R.lastMonth.net?Math.min(100,R.mtd.net/R.lastMonth.net*100).toFixed(1):100}%"></i></span><span class="val">${yenS(R.mtd.net)}</span><span class="cnt">${R.mtd.n}件</span></div>
   <div class="row"><span class="nm">${R.lmLabel} 同期間</span><span class="bar"><i style="width:${R.lastMonth.net?Math.min(100,R.lmtd.net/R.lastMonth.net*100).toFixed(1):0}%;opacity:.55"></i></span><span class="val">${yenS(R.lmtd.net)}</span><span class="cnt">${R.lmtd.n}件</span></div>
   <div class="row"><span class="nm">${R.lmLabel} 月計</span><span class="bar"><i style="width:100%;opacity:.35"></i></span><span class="val">${yenS(R.lastMonth.net)}</span><span class="cnt">${R.lastMonth.n}件</span></div>
  </div>`;
 document.getElementById('p-channel').innerHTML=`
  <div class="page-h">チャネル</div><div class="page-sub">直近30日・純売上(手数料控除後)</div>
  <span class="badge">${rb}</span>
  <div class="card"><h3>チャネル別 純売上(30日)</h3>${rows(R.channels_30,'net')}</div>`;
 document.getElementById('p-product').innerHTML=`
  <div class="page-h">商品</div><div class="page-sub">直近30日・純売上 TOP12</div>
  <span class="badge">${rb}</span>
  <div class="card"><h3>商品別 純売上(30日)</h3>${rows(R.products_30,'net')}</div>`;
 renderCombined(); renderSquare(); renderAudit();
 pick('tnet',R.d30.length-1); pick('tn',R.d30.length-1);
}
function renderCombined(){
 const C=Array.isArray(DATA.combined)?DATA.combined:(DATA.combined||{})[REGION]||[];
 const rb={'all':'全社','tokyo':'東京','kyoto':'京都'}[REGION];
 let body;
 if(C&&C.length){
  const tb=C.reduce((s,x)=>s+x.bokun,0), ts=C.reduce((s,x)=>s+x.square,0), tt=tb+ts;
  const mx=Math.max(...C.map(x=>x.total),1);
  body=`
  <div class="kpis" style="margin-top:8px">
   <div class="kpi" style="grid-column:1/-1"><div class="t">昨日の総売上(前売り+現地)</div><div class="v" style="font-size:1.5rem">${yenS(tt)}</div><div class="s">Bokun前売り ${yenS(tb)} + Square現地 ${yenS(ts)}</div></div>
  </div>
  <div class="card"><h3>アクティビティ別 総売上(昨日)</h3>
  ${C.map(x=>`
   <div style="padding:9px 0;border-bottom:1px dashed rgba(43,51,70,.6)">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
     <span style="font-size:.82rem;color:var(--ink-dim);font-weight:700">${x.name}</span>
     <span style="font-size:.85rem;font-variant-numeric:tabular-nums">${yen(x.total)}</span>
    </div>
    <div style="display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--bg2);margin:5px 0 3px">
     <i style="width:${(x.bokun/mx*100).toFixed(1)}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold))"></i>
     <i style="width:${(x.square/mx*100).toFixed(1)}%;background:#6cc796"></i>
    </div>
    <div style="font-size:.66rem;color:var(--ink-faint)">前売り ${yen(x.bokun)}(${x.bn}件) ・ <span style="color:#6cc796">現地 ${yen(x.square)}(${x.sn}件)</span></div>
   </div>`).join('')}
  </div>
  <div class="note">前売り=Bokun純売上(OTA手数料控除後・催行日ベース)。現地=Square純売上(税抜・返金控除後=Squareダッシュボードと同一定義)。二重計上なし(別々の決済)。金=前売り、緑=現地。</div>`;
 }else{
  body=`<div class="card"><div class="note">合算データなし(Square未取得の日は前売りのみ表示されます)</div></div>`;
 }
 document.getElementById('p-combined').innerHTML=`
  <div class="page-h">合算</div><div class="page-sub">前売り+現地=本当の昨日の売上</div><span class="badge">${rb}</span>${body}`;
}
function renderSquare(){
 const sq=DATA.square;
 const rb={'all':'全社','tokyo':'東京','kyoto':'京都'}[REGION];
 let body;
 const flt=sq&&sq.locations?sq.locations.filter(l=>REGION==='all'||l.region===REGION):[];
 if(flt.length){
  const locs=[...flt].sort((a,b)=>(b.gross||0)-(a.gross||0));
  const tg=locs.reduce((s,l)=>s+(l.gross||0),0), to=locs.reduce((s,l)=>s+l.orders,0);
  const mx=Math.max(...locs.map(l=>l.gross||0),1);
  body=`
  <div class="kpis" style="margin-top:8px">
   <div class="kpi"><div class="t">現地売上(総額)</div><div class="v" style="font-size:1.3rem">${yenS(tg)}</div><div class="s">${sq.date}</div></div>
   <div class="kpi"><div class="t">会計件数</div><div class="v">${to}</div><div class="s">全${locs.length}店舗</div></div>
  </div>
  <div class="card"><h3>店舗別 現地売上(昨日)</h3>
  ${locs.map(l=>`<div class="row"><span class="nm">${l.name}</span><span class="bar"><i style="width:${((l.gross||0)/mx*100).toFixed(1)}%"></i></span><span class="val">${yen(l.gross||0)}</span><span class="cnt">${l.orders}件</span></div>`).join('')}
  </div>
  <div class="note">Square POS(COMPLETED注文)の純売上=税抜・返金控除後(Squareダッシュボードの「純売上」と一致)。BokunのOTA前売りとは別枠。</div>`;
 }else{
  body=`<div class="card"><h3>本日はSquareデータ未取得</h3><div class="note">Square連携が朝の実行時に利用できなかったか、取得に失敗しました。Bokun側の数字には影響ありません。翌朝の実行で自動的に再試行されます。</div></div>`;
 }
 document.getElementById('p-square').innerHTML=`
  <div class="page-h">Square 現地売上</div><div class="page-sub">店舗レジ実績(前売りとは別枠)</div><span class="badge">${rb}</span>${body}`;
}
function renderAudit(){
 const m=DATA.meta||{};
 const okic=b=>b?'<span class="ic ok">●</span>':'<span class="ic ng">▲</span>';
 const miss=(m.missingDays||[]).length;
 const st=[
  [true,'最終更新',DATA.updated+' JST'],
  [true,'実行時間',(m.runtimeSec||'—')+' 秒'],
  [miss===0,'データ取得',`${m.daysFetched||'—'}/${m.daysTotal||'—'}日 (${m.rangeFrom}〜${m.rangeTo})`+(miss?` / 欠損: ${m.missingDays.join(', ')}`:' / 欠損なし')],
  [(m.accFail||{}).tokyo_account===0,'Bokun 東京アカウント',(m.accFail&&m.accFail.tokyo_account?`エラー${m.accFail.tokyo_account}日`:'疎通OK')],
  [(m.accFail||{}).kyoto_account===0,'Bokun 京都アカウント',(m.accFail&&m.accFail.kyoto_account?`エラー${m.accFail.kyoto_account}日`:'疎通OK')],
  [m.fxOk,'為替(Bokun公式)',m.fxOk?`1USD=¥${m.usdJpy} / 1EUR=¥${m.eurJpy}`:'取得失敗'],
  [m.squareOk,'Square現地売上',m.squareOk?'取得OK':'本日は未取得(ベストエフォート)'],
  [m.selfCheck?!m.selfCheck.failed.length:false,'数値自己検証',m.selfCheck?`${m.selfCheck.passed}/${m.selfCheck.total} 項目OK${m.selfCheck.failed.length?' / NG: '+m.selfCheck.failed.join('、'):''}`:'未実施'],
  [true,'次回自動更新',m.schedule||'毎朝 6:00 JST'],
 ];
 document.getElementById('p-audit').innerHTML=`
  <div class="page-h">審査</div><div class="page-sub">このレポート自体の健全性チェック</div>
  <div class="card"><h3>稼働ステータス</h3>
  ${st.map(([ok,lb,vl])=>`<div class="st">${okic(ok)}<span class="lb">${lb}</span><span class="vl">${vl}</span></div>`).join('')}
  </div>
  <div class="card"><h3>数字の校正</h3><div class="note">${m.calibration||''}</div></div>
  <div class="card"><h3>集計ルール</h3><div class="note">
  ・純売上 = OTA手数料控除後の自社受取額(Bokun請求書 totalSansCommission を請求書通貨で円換算)。<br>
  ・催行日(Travelled)基準・キャンセル除外。BOKUN管理画面の Experience Sales Report と同条件。<br>
  ・東京=Traveling Tokyoアカウント、京都=Traveling Kyotoアカウント(祇園ZEN含む)をSUPPLIERロールで統合、予約ID重複排除。<br>
  ・Squareは店頭レジ(COMPLETED)の実額で、Bokun前売りとは別枠。<br>
  <b style="color:#7cc98a">✓ 全チャネル是正済み(数値はOTA精算実額と突合済み)。</b>
